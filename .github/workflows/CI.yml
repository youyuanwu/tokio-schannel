name: build

on: [push, pull_request, workflow_dispatch]

env:
  RUST_MSRV: "1.85.0"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      rust-msrv: ${{ env.RUST_MSRV }}
      rust-version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: parse
        run: |
          version=$(grep 'channel' rust-toolchain.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    # schannel is a Windows-only crate, so only build/test on Windows.
    runs-on: ${{ matrix.os }}
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest ]
        rust: [ '${{ needs.setup.outputs.rust-msrv }}', '${{ needs.setup.outputs.rust-version }}' ]
    steps:
    - uses: actions/checkout@v5

    - name: Install rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run cargo check
      run: cargo +${{ matrix.rust }} check

    - name: Run cargo fmt
      run: cargo +${{ matrix.rust }} fmt --all -- --check

    - name: Run cargo clippy
      run: cargo +${{ matrix.rust }} clippy --all-targets -- -D warnings

    - name: Run cargo test
      run: cargo +${{ matrix.rust }} test --all -- --nocapture

    - name: Run llvm-cov
      run: cargo +${{ matrix.rust }} llvm-cov --codecov --output-path codecov.json --ignore-filename-regex tests.rs

    - name: Show cov summary
      run: cargo +${{ matrix.rust }} llvm-cov report --summary-only --ignore-filename-regex tests.rs

    - name: Upload Report to Codecov
      # Dependabot (and other) runs cannot access repository Actions secrets,
      # so CODECOV_TOKEN is empty there. Skip the upload instead of failing.
      if: env.CODECOV_TOKEN != ''
      uses: codecov/codecov-action@v5
      with:
        files: ./codecov.json
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }} # required
